<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #4facfe;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .students-section {
            background: white;
        }

        .students-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .student-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .student-table th,
        .student-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }

        .student-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
        }

        .student-table tr:hover {
            background: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2em;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Student Management System</h1>
            <p>Django REST Framework CRUD API</p>
        </header>

        <div class="main-content">
            <div class="form-section">
                <h2 id="formTitle">Add New Student</h2>
                <div id="message"></div>
                
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    
                    <div class="form-group">
                        <label for="name">Student Name *</label>
                        <input type="text" id="name" name="name" required placeholder="Enter student name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required placeholder="Enter email address">
                    </div>
                    
                    <div class="form-group">
                        <label for="age">Age *</label>
                        <input type="number" id="age" name="age" required min="0" max="150" placeholder="Enter age">
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Student</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="students-section">
                <h2>Students List</h2>
                
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="totalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                </div>

                <div id="studentsContainer">
                    <div class="loading">Loading students...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/students';
        let isEditing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadStudents();
            
            document.getElementById('studentForm').addEventListener('submit', handleSubmit);
        });

        // Load all students
        async function loadStudents() {
            try {
                const response = await fetch(API_BASE_URL + '/');
                const data = await response.json();
                
                if (response.ok) {
                    displayStudents(data.data);
                    updateStats(data.count);
                } else {
                    showMessage('Error loading students: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('Error connecting to server. Make sure the Django server is running.', 'error');
                console.error('Error:', error);
            }
        }

        // Display students in table
        function displayStudents(students) {
            const container = document.getElementById('studentsContainer');
            
            if (students.length === 0) {
                container.innerHTML = '<div class="empty-state">No students found. Add your first student!</div>';
                return;
            }

            const table = `
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${students.map(student => `
                            <tr>
                                <td>${student.id}</td>
                                <td>${student.name}</td>
                                <td>${student.email}</td>
                                <td>${student.age}</td>
                                <td>${new Date(student.created_at).toLocaleDateString()}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="btn btn-warning btn-sm" onclick="editStudent(${student.id})">Edit</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.id}, '${student.name}')">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
        }

        // Update statistics
        function updateStats(count) {
            document.getElementById('totalStudents').textContent = count;
        }

        // Handle form submission
        async function handleSubmit(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value)
            };

            try {
                let response;
                const studentId = document.getElementById('studentId').value;

                if (isEditing && studentId) {
                    // Update existing student
                    response = await fetch(`${API_BASE_URL}/${studentId}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                } else {
                    // Create new student
                    response = await fetch(API_BASE_URL + '/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    resetForm();
                    loadStudents();
                } else {
                    showMessage('Error: ' + data.message, 'error');
                    if (data.errors) {
                        console.error('Validation errors:', data.errors);
                    }
                }
            } catch (error) {
                showMessage('Error connecting to server', 'error');
                console.error('Error:', error);
            }
        }

        // Edit student
        async function editStudent(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/${id}/`);
                const data = await response.json();

                if (response.ok) {
                    const student = data.data;
                    
                    document.getElementById('studentId').value = student.id;
                    document.getElementById('name').value = student.name;
                    document.getElementById('email').value = student.email;
                    document.getElementById('age').value = student.age;
                    
                    document.getElementById('formTitle').textContent = 'Edit Student';
                    document.getElementById('submitBtn').textContent = 'Update Student';
                    
                    isEditing = true;
                    
                    // Scroll to form
                    document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showMessage('Error loading student: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('Error connecting to server', 'error');
                console.error('Error:', error);
            }
        }

        // Delete student
        async function deleteStudent(id, name) {
            if (confirm(`Are you sure you want to delete ${name}?`)) {
                try {
                    const response = await fetch(`${API_BASE_URL}/${id}/`, {
                        method: 'DELETE'
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showMessage(data.message, 'success');
                        loadStudents();
                    } else {
                        showMessage('Error deleting student: ' + data.message, 'error');
                    }
                } catch (error) {
                    showMessage('Error connecting to server', 'error');
                    console.error('Error:', error);
                }
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
            document.getElementById('formTitle').textContent = 'Add New Student';
            document.getElementById('submitBtn').textContent = 'Add Student';
            isEditing = false;
            hideMessage();
        }

        // Show message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                hideMessage();
            }, 5000);
        }

        // Hide message
        function hideMessage() {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';
        }
    </script>
</body>
</html>
